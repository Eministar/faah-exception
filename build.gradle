plugins {
    id 'java'
    id 'org.jetbrains.intellij.platform' version '2.10.2'
}

group = 'dev.eministar.fahsound'
version = '1.0.4'

repositories {
    mavenCentral()
    intellijPlatform {
        defaultRepositories()
    }
}

dependencies {
    implementation 'javazoom:jlayer:1.0.1'

    intellijPlatform {
        intellijIdeaCommunity('2024.3.5')
        bundledPlugin('org.jetbrains.plugins.gradle')
        bundledPlugin('org.jetbrains.idea.maven')
    }

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

intellijPlatform {
    pluginConfiguration {
        name = 'FAH Failure Sound'
        version = project.version.toString()
        description = '''
### Hear feedback instantly

**FAH Failure Sound** plays configurable audio for key IntelliJ events, so you can stay focused on code instead of constantly watching output tabs.

### Supported events

- Build: `failed`, `warning`, `succeeded`
- Run/Debug: `failed`, `succeeded`
- External tools: `Gradle failed`, `Maven failed`

### What you can customize

- Per-event sound source (`bundled`, `custom`, `no sound`)
- Per-event max playback duration (`Max ms`)
- Global volume and debounce
- Optional IDE notifications
- Custom `.mp3` and `.wav` files from your IDE config folder

Built for faster feedback loops while coding.
'''.trim()
        ideaVersion {
            sinceBuild = '243'
        }
    }
    pluginVerification {
        ides {
            recommended()
        }
    }
    signing {
        certificateChain = providers.environmentVariable('JB_CERTIFICATE_CHAIN')
        privateKey = providers.environmentVariable('JB_PRIVATE_KEY')
        password = providers.environmentVariable('JB_PRIVATE_KEY_PASSWORD')
    }
    publishing {
        token = providers.environmentVariable('JB_PUBLISH_TOKEN')
    }
}
